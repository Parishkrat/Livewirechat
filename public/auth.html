<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Auth System</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        width: 370px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        text-align: center;
      }
      h2 {
        margin-bottom: 25px;
        font-weight: 500;
        color: #111;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        box-sizing: border-box;
        transition: 0.2s;
      }
      input:focus {
        border-color: #60a5fa;
        outline: none;
      }
      button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        border: none;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background: #1d4ed8;
      }
      .toggle {
        margin-top: 15px;
        font-size: 13px;
        color: #555;
        cursor: pointer;
      }
      .toggle:hover {
        color: #111;
      }
      .message {
        margin-top: 10px;
        font-size: 13px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="formTitle">Register</h2>
      <input type="email" id="email" placeholder="Enter Email" />
      <input type="password" id="password" placeholder="Enter Password" />
      <button onclick="submitForm()">Submit</button>
      <div class="toggle" onclick="toggleForm()">Switch to Login</div>
      <div class="message" id="message"></div>
    </div>

    <script>
      let isLogin = false;

      function toggleForm() {
        isLogin = !isLogin;
        document.getElementById("formTitle").innerText = isLogin
          ? "Login"
          : "Register";
        document.querySelector(".toggle").innerText = isLogin
          ? "Switch to Register"
          : "Switch to Login";
      }

      async function submitForm() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const url = isLogin ? "/api/login" : "/api/register";

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password }),
          });

          console.log("Status:", res.status);

          const text = await res.text();
          console.log("Raw response:", text);

          const data = JSON.parse(text);
          console.log("LOGIN RESPONSE:", data); // ✅ now it's correct

          document.getElementById("message").innerText = data.message;

          // ✅ ADD THIS BACK (you accidentally removed it)
          if (isLogin && data.success) {
            localStorage.setItem("myUserId", data.userId);
            window.location.href = "/chat.html";
          }
        } catch (err) {
          console.error(err);
          document.getElementById("message").innerText = "Something went wrong";
        }

        async function checkUnread() {
          const res = await fetch("/api/unread", {
            credentials: "include",
          });

          const data = await res.json();

          if (data.data.length > 0) {
            const bar = document.getElementById("notificationBar");
            bar.innerText = `${data.data.length} new conversations`;
            bar.style.display = "block";
          }
        }
      }
    </script>
  </body>
</html>
